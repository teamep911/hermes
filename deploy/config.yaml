# Hermes Agent — config.yaml for the OEM Oracle monitoring deployment.
# Install to ~/.hermes/config.yaml on the gateway host.
# Secrets live in ~/.hermes/.env (see hermes.env.example), NOT here.

# --- Model: use your OWN Anthropic API key (not Nous Portal) ---
# ANTHROPIC_API_KEY is read from ~/.hermes/.env.
# claude-opus-4-8 = best RCA quality; claude-sonnet-4-6 = cheaper/faster.
model:
  provider: anthropic
  default: claude-opus-4-8

# --- Inbound: OEM pushes signed alerts to the webhook adapter ---
# Endpoint: http://<gateway-host>:8644/webhooks/oem-alert
# Generic HMAC: header "X-Webhook-Signature" = raw HMAC-SHA256 hex of the body,
# keyed by the route `secret` (WEBHOOK_SECRET in .env as the fallback).
platforms:
  webhook:
    enabled: true
    extra:
      port: 8644
      routes:
        oem-alert:
          # accept all event types on this route
          events: []
          secret: ${WEBHOOK_SECRET}
          # The OEM payload is already redacted on the DB host (scripts/redact.py).
          # Load all three Oracle skills; the agent picks by each skill's
          # "When to Use" section.
          skills: [alert-triage, oracle-rca, awr-summary]
          prompt: |
            Bạn nhận một cảnh báo OEM Oracle (dữ liệu đã được che). Chọn skill phù
            hợp và đưa ra RCA ngắn gọn, có hành động cụ thể.

            alert_type: {alert_type}
            target:     {target_name}
            metric:     {metric_name} = {metric_value}
            severity:   {severity}
            time:       {event_time}
            message:    {message}

            === Session / lock dump (nếu có) ===
            {session_text}

            === AWR (đã cắt gọn, nếu có) ===
            {awr_text}
          # Deliver the agent's analysis to the Google Chat space.
          # NOTE: confirm the delivery key against your installed Hermes version
          # (Google Chat is provisioned via `hermes gateway setup`).
          deliver: google_chat
          deliver_extra:
            space: ${GOOGLE_CHAT_HOME_CHANNEL}
