# MERGE this block into your existing ~/.hermes/config.yaml.
# Do NOT copy it over the whole file — your config already has the model
# (custom internal endpoint), memory and other settings that must stay.
#
# Verified end-to-end on Hermes Agent v0.17.0 (see docs/ARCHITECTURE.md):
#   - generic HMAC header is "X-Webhook-Signature" = hex(HMAC-SHA256(body))
#   - named string fields (e.g. {awr_text}) are NOT truncated; only {__raw__}
#     (4000 chars) and dict/list fields (2000 chars) are
#
# Secret: ${VAR} interpolation does NOT apply to platform config when the
# gateway runs as a systemd service (it doesn't load .env into the process env
# before parsing config). Put the secret LITERALLY here (config.yaml is 0600).
#
# Delivery: `deliver: gchat_webhook` uses the bundled-in-this-repo platform
# plugin (deploy/plugins/gchat_webhook) which POSTs the full agent response to
# a Google Chat space INCOMING WEBHOOK (no GCP project). Install + enable that
# plugin and set GOOGLE_CHAT_WEBHOOK_URL in ~/.hermes/.env first.

plugins:
  enabled:
    - gchat_webhook-platform        # the Google Chat incoming-webhook adapter

platforms:
  webhook:
    enabled: true
    extra:
      port: 8644
      routes:
        oem-alert:
          events: []                      # accept any event on this route
          secret: "PUT-YOUR-LITERAL-HMAC-SECRET-HERE"   # must match OEM side
          skills: [alert-triage, oracle-rca, awr-summary]
          prompt: |
            Bạn nhận một cảnh báo OEM Oracle (dữ liệu đã được che). Chọn skill
            phân tích phù hợp (alert-triage / oracle-rca / awr-summary) và đưa
            ra RCA ngắn gọn, có hành động cụ thể. Trả lời bằng tiếng Việt.

            alert_type: {alert_type}
            target:     {target_name}
            metric:     {metric_name} = {metric_value}
            severity:   {severity}
            time:       {event_time}
            message:    {message}

            === Session / lock dump (nếu có) ===
            {session_text}

            === AWR (đã cắt gọn, nếu có) ===
            {awr_text}
          # Full agent response is POSTed to GOOGLE_CHAT_WEBHOOK_URL by the
          # gchat_webhook platform plugin (deterministic, not agent-dependent).
          deliver: gchat_webhook
