# MERGE this block into your existing ~/.hermes/config.yaml.
# Do NOT copy it over the whole file — your config already has the model
# (custom internal endpoint), memory and other settings that must stay.
#
# Verified against Hermes Agent v0.17.0:
#   - generic HMAC header is "X-Webhook-Signature" = hex(HMAC-SHA256(body))
#   - ${VAR} env interpolation works, so `secret: ${WEBHOOK_SECRET}` is fine
#   - named string fields (e.g. {awr_text}) are NOT truncated; only {__raw__}
#     (4000 chars) and dict/list fields (2000 chars) are
#
# Delivery: Google Chat via the space INCOMING WEBHOOK (no GCP project). The
# native google_chat plugin needs Pub/Sub+GCP, so instead the agent calls the
# `notify-google-chat` skill, which POSTs to GOOGLE_CHAT_WEBHOOK_URL. The route
# therefore delivers to `log` (the real delivery is done inside the agent run).

platforms:
  webhook:
    enabled: true
    extra:
      port: 8644
      routes:
        oem-alert:
          events: []                      # accept any event on this route
          secret: ${WEBHOOK_SECRET}       # required per route
          skills: [alert-triage, oracle-rca, awr-summary, notify-google-chat]
          prompt: |
            Bạn nhận một cảnh báo OEM Oracle (dữ liệu đã được che). Hãy:
            1) Chọn skill phân tích phù hợp (alert-triage / oracle-rca /
               awr-summary) và đưa ra RCA ngắn gọn, có hành động cụ thể.
            2) BẮT BUỘC bước cuối: dùng skill `notify-google-chat` để gửi kết
               quả vào Google Chat. Không được bỏ qua bước này.

            alert_type: {alert_type}
            target:     {target_name}
            metric:     {metric_name} = {metric_value}
            severity:   {severity}
            time:       {event_time}
            message:    {message}

            === Session / lock dump (nếu có) ===
            {session_text}

            === AWR (đã cắt gọn, nếu có) ===
            {awr_text}
          deliver: log
