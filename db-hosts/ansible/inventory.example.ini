# Example inventory. Copy to inventory.ini and fill real hosts/vars.
# Put secrets (telegraf_write_token, DB monitor passwords) in ansible-vault.

[db_hosts:vars]
central_influx_url=http://<central-vm-ip>:8086
telegraf_write_token=<telegraf-write-token-from-central-vm>   # vault this

[db_hosts]
db-prod-1  instance_name=ORCLPROD  db_type=oracle    oracle_home=/u01/app/oracle/product/19.0.0/dbhome_1 oracle_sid=ORCLPROD
db-pg-1    instance_name=PGSALES   db_type=postgres  pg_monitor_user=telegraf pg_monitor_password=CHANGEME
db-my-1    instance_name=MYSHOP    db_type=mysql     mysql_monitor_user=telegraf mysql_monitor_password=CHANGEME
db-mongo-1 instance_name=MONGO1    db_type=mongodb
db-mssql-1 instance_name=MSSQL1    db_type=sqlserver mssql_user=telegraf mssql_password=CHANGEME
